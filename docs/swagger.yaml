basePath: /
definitions:
  models.Category:
    properties:
      category_id:
        type: integer
      name:
        type: string
    type: object
  models.Debtor:
    properties:
      address:
        example: 123 ถ.สุขุมวิท แขวงคลองเตย เขตคลองเตย กทม 10110
        type: string
      credit_limit:
        example: 2000
        type: number
      current_debt:
        example: 0
        type: number
      debtor_id:
        type: integer
      img_debtor:
        example: https://image.url/debtor.jpg
        type: string
      name:
        example: ป้าเพ็ญ
        type: string
      phone:
        example: "0654891234"
        type: string
      shop_id:
        example: 1
        type: integer
    type: object
  models.LoginInput:
    properties:
      password:
        type: string
      username:
        description: รับค่ามาเป็น "username" แต่เราจะเอาไปเช็คว่าเป็น Email หรือ เบอร์โทร
          ใน Controller
        type: string
    required:
    - password
    - username
    type: object
  models.PayDebtRequest:
    properties:
      amount_paid:
        description: ยอดเงินที่จ่าย
        example: 45
        type: number
      debtor_id:
        description: ไอดีลูกหนี้
        example: 1
        type: integer
      pay_with:
        description: ชื่อพนักงานที่รับเงิน
        example: น้องปอ
        type: string
      payment_method:
        description: วิธีจ่าย (เงินสด/เงินโอน)
        example: จ่ายเงินสด
        type: string
      pin_code:
        description: รหัส PIN 6 หลัก
        example: "191047"
        type: string
      shop_id:
        description: ไอดีร้านค้า
        example: 3
        type: integer
    required:
    - amount_paid
    - debtor_id
    - pay_with
    - payment_method
    - pin_code
    - shop_id
    type: object
  models.Product:
    properties:
      barcode:
        example: "885123456789"
        type: string
      category:
        $ref: '#/definitions/models.Category'
      category_id:
        example: 2
        type: integer
      cost_price:
        example: 10.5
        type: number
      img_product:
        example: https://image.url/cola.jpg
        type: string
      name:
        example: น้ำอัดลม โคล่า
        type: string
      product_code:
        type: string
      product_id:
        type: integer
      sell_price:
        example: 15
        type: number
      shop_id:
        example: 1
        type: integer
      status:
        example: true
        type: boolean
      stock:
        description: gte=0 คือ มากกว่าหรือเท่ากับ 0
        example: 100
        minimum: 0
        type: integer
      unit:
        example: ขวด
        type: string
    required:
    - category_id
    - cost_price
    - img_product
    - name
    - sell_price
    - shop_id
    - unit
    type: object
  models.RegisterInput:
    properties:
      email:
        type: string
      password:
        example: "123456"
        type: string
      phone:
        type: string
      username:
        example: poder
        type: string
    required:
    - email
    - password
    - phone
    - username
    type: object
  models.Sale:
    properties:
      created_at:
        type: string
      created_buy:
        type: string
      created_time:
        type: string
      debtor_id:
        description: ใช้ Pointer เพื่อให้เป็นค่า Null ได้
        type: integer
      net_price:
        type: number
      note:
        type: string
      pay:
        type: number
      payment_method:
        description: '''cash'', ''transfer'', ''credit'''
        type: string
      sale_id:
        type: integer
      sale_items:
        description: สำหรับดึงข้อมูล SaleItems ออกมาพร้อมกับ Sale (ถ้าใช้ GORM)
        items:
          $ref: '#/definitions/models.SaleItem'
        type: array
      shop_id:
        type: integer
    type: object
  models.SaleItem:
    properties:
      amount:
        type: integer
      price_per_unit:
        type: number
      product_id:
        type: integer
      sale_id:
        type: integer
      sale_items_id:
        type: integer
      total_price:
        type: number
    type: object
  models.Shop:
    properties:
      address:
        example: 123 ถ.สุขุมวิท แขวงคลองเตย เขตคลองเตย กทม 10110
        type: string
      img_qrcode:
        example: https://image.url/qrcode.jpg
        type: string
      img_shop:
        example: https://image.url/homeshop.jpg
        type: string
      name:
        example: จันทร์เพ็ญ
        type: string
      phone:
        example: "0985490445"
        type: string
      pin_code:
        example: "191047"
        type: string
      shop_id:
        type: integer
      user_id:
        example: 1
        type: integer
    required:
    - address
    - name
    - phone
    - pin_code
    - user_id
    type: object
  models.UpdateShopInput:
    properties:
      address:
        example: 555 ถ.ลาดพร้าว
        type: string
      img_qrcode:
        example: https://image.url/new_qrcode.jpg
        type: string
      img_shop:
        example: https://image.url/new_shop.jpg
        type: string
      name:
        example: ร้านจันทร์เพ็ญ (แก้ไข)
        type: string
      phone:
        example: "0899998888"
        type: string
      pin_code:
        example: "654321"
        type: string
    type: object
  models.UpdateStockRequest:
    properties:
      product_id:
        type: integer
      stock:
        type: integer
    required:
    - product_id
    - stock
    type: object
host: localhost:8080
info:
  contact: {}
  description: API สำหรับระบบ EazyStore
  title: EazyStore API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: ล็อกอินด้วย Username, Email หรือ เบอร์โทรศัพท์
      parameters:
      - description: ข้อมูลสำหรับ Login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: เข้าสู่ระบบ (Login)
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: ลงทะเบียนผู้ใช้ใหม่เข้าสู่ระบบ
      parameters:
      - description: ข้อมูลสำหรับสมัครสมาชิก
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.RegisterInput'
      produces:
      - application/json
      responses:
        "200":
          description: 'status: success'
          schema:
            type: object
      summary: สมัครสมาชิก
      tags:
      - Auth
  /api/createCreditSale:
    post:
      consumes:
      - application/json
      description: สร้างบิลขายและอัปเดตยอดหนี้คงค้างของลูกหนี้ในคราวเดียว
      parameters:
      - description: ข้อมูลรายการขายค้างชำระ
        in: body
        name: Sale
        required: true
        schema:
          $ref: '#/definitions/models.Sale'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: เพิ่มรายการขายค้างชำระ (เฉพาะ Credit เท่านั้น)
      tags:
      - Sale
  /api/createDebtor:
    post:
      consumes:
      - application/json
      description: สร้างลูกหนี้ใหม่ลงในฐานข้อมูล
      parameters:
      - description: ข้อมูลลูกหนี้
        in: body
        name: Debtor
        required: true
        schema:
          $ref: '#/definitions/models.Debtor'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Debtor'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: เพิ่มลูกหนี้
      tags:
      - Debtor
  /api/createProduct:
    post:
      consumes:
      - application/json
      description: สร้างรายการสินค้าใหม่ลงในฐานข้อมูล
      parameters:
      - description: ข้อมูลสินค้า
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/models.Product'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: เพิ่มสินค้า
      tags:
      - Product
  /api/createShop:
    post:
      consumes:
      - application/json
      description: สร้างร้านค้าใหม่ลงในฐานข้อมูล
      parameters:
      - description: ข้อมูลร้านค้า
        in: body
        name: Shop
        required: true
        schema:
          $ref: '#/definitions/models.Shop'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Shop'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: เพิ่มร้านค้า
      tags:
      - Shop
  /api/debtor:
    get:
      consumes:
      - application/json
      description: ดึงข้อมูลลูกหนี้ทั้งหมด ของ shopid นั้น
      parameters:
      - description: รหัสร้านค้า (Shop ID)
        in: query
        name: shop_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Debtor'
            type: array
        "400":
          description: ระบุพารามิเตอร์ไม่ครบ
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: ไม่พบข้อมูลลูกหนี้
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ดึงข้อมูลลูกหนี้
      tags:
      - Debtor
  /api/debtor/{id}/history:
    get:
      consumes:
      - application/json
      description: ดึงข้อมูลลูกหนี้ ยอดคงเหลือ และประวัติบิลที่ยังค้างชำระพร้อมรายการสินค้า
      parameters:
      - description: รหัสลูกหนี้ (Debtor ID)
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: ข้อมูลไม่ถูกต้อง
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: ไม่พบข้อมูลลูกหนี้
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: เกิดข้อผิดพลาดในเซิร์ฟเวอร์
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ดึงประวัติการติดหนี้ของลูกหนี้
      tags:
      - Debtor
  /api/debtor/search:
    get:
      consumes:
      - application/json
      description: ค้นหาลูกหนี้ด้วย Keyword (รองรับทั้ง ชื่อลูกหนี้, เบอร์โทร)
      parameters:
      - description: คำค้นหา (ระบุ  ชื่อ หรือ เบอร์โทร)
        in: query
        name: keyword
        required: true
        type: string
      - description: รหัสร้านค้า (Shop ID)
        in: query
        name: shop_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Debtor'
            type: array
        "400":
          description: ระบุพารามิเตอร์ไม่ครบ
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: ไม่พบข้อมูลลูกหนี้
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ค้นหาลูกหนี้
      tags:
      - Debtor
  /api/deleteShop/{shop_id}:
    delete:
      consumes:
      - application/json
      description: ลบร้านค้าของ User id และ Shop id ที่ส่งเข้ามา
      parameters:
      - description: Shop ID
        in: path
        name: shop_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Shop not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ลบร้านค้า
      tags:
      - Shop
  /api/getNullBarcode:
    get:
      consumes:
      - application/json
      description: ดึงรายการสินค้าที่ไม่มีบาร์โค้ดแยกตามร้านค้า
      parameters:
      - description: รหัสร้านค้า (Shop ID)
        in: query
        name: shop_id
        required: true
        type: integer
      - description: รหัสหมวดหมู่สินค้า (Category ID)
        in: query
        name: category_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Product'
            type: array
        "404":
          description: Product not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ดูสินค้าไม่มีบาร์โค้ด
      tags:
      - Product
  /api/getShop:
    get:
      consumes:
      - application/json
      description: ดูร้านค้าของ User ที่ Login อยู่ (ดึง ID จาก Token)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Shop'
            type: array
        "404":
          description: Shop not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ดูร้านค้า
      tags:
      - Shop
  /api/paymentDebt:
    post:
      consumes:
      - application/json
      description: API นี้ใช้สำหรับบันทึกการชำระหนี้ โดยจะทำการตรวจสอบ PIN Code 6
        หลักของร้านค้าก่อนตัดยอดหนี้และบันทึกประวัติ
      parameters:
      - description: ข้อมูลการชำระหนี้และ PIN Code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.PayDebtRequest'
      produces:
      - application/json
      responses:
        "200":
          description: บันทึกสำเร็จ (return JSON object)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: ข้อมูลไม่ครบถ้วน (Bad Request)
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: รหัส PIN ไม่ถูกต้อง (Unauthorized)
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: ไม่พบร้านค้า หรือ ลูกหนี้ (Not Found)
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: ข้อผิดพลาดภายในเซิร์ฟเวอร์ (Internal Server Error)
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ชำระหนี้ (พร้อมตรวจสอบ PIN ร้านค้า)
      tags:
      - Debtor
  /api/product/search:
    get:
      consumes:
      - application/json
      description: ค้นหาสินค้าด้วย Keyword เฉพาะในร้านที่ระบุ (ป้องกันการเจอของร้านอื่น)
      parameters:
      - description: คำค้นหา (Barcode, รหัส, ชื่อ)
        in: query
        name: keyword
        required: true
        type: string
      - description: รหัสร้านค้า (Shop ID)
        in: query
        name: shop_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Product not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ค้นหาสินค้า (Search Product)
      tags:
      - Product
  /api/product/stock:
    put:
      consumes:
      - application/json
      description: บันทึกยอดสต็อกสินค้าล่าสุด
      parameters:
      - description: ข้อมูลอัปเดตสต็อก
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateStockRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'message: success'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid input
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Update failed
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: อัปเดตสต็อกสินค้า (Update Product Stock)
      tags:
      - Product
  /api/products:
    get:
      consumes:
      - application/json
      description: ดึงข้อมูลสินค้าทั้งหมดที่ผูกกับ shop_id โดยเรียงจากใหม่ไปเก่า
      parameters:
      - description: รหัสร้านค้า (Shop ID)
        in: query
        name: shop_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Product'
            type: array
        "400":
          description: กรุณาระบุ shop_id
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: ไม่สามารถดึงข้อมูลสินค้าได้
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ดึงรายการสินค้าทั้งหมดของร้านค้า
      tags:
      - Product
  /api/products/{id}:
    put:
      consumes:
      - application/json
      description: อัปเดตเฉพาะฟิลด์ที่ส่งมา และบันทึกประวัติราคาอัตโนมัติ (Manual
        Log)
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: ข้อมูลสินค้า (ส่งเฉพาะตัวที่แก้)
        in: body
        name: product
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
      security:
      - BearerAuth: []
      summary: แก้ไขข้อมูลสินค้า (Partial Update)
      tags:
      - Product
  /api/updateShop/{shop_id}:
    put:
      consumes:
      - application/json
      description: แก้ไขเฉพาะข้อมูลที่ส่งมา (Field ไหนไม่ส่งมา จะใช้ค่าเดิม)
      parameters:
      - description: Shop ID
        in: path
        name: shop_id
        required: true
        type: integer
      - description: ข้อมูลที่ต้องการแก้
        in: body
        name: shop
        required: true
        schema:
          $ref: '#/definitions/models.UpdateShopInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
