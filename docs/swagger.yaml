basePath: /
definitions:
  models.Category:
    properties:
      category_id:
        type: integer
      name:
        type: string
    type: object
  models.LoginInput:
    properties:
      password:
        type: string
      username:
        description: รับค่ามาเป็น "username" แต่เราจะเอาไปเช็คว่าเป็น Email หรือ เบอร์โทร
          ใน Controller
        type: string
    required:
    - password
    - username
    type: object
  models.Product:
    properties:
      barcode:
        example: "885123456789"
        type: string
      category:
        allOf:
        - $ref: '#/definitions/models.Category'
        description: |-
          ✨ เพิ่มส่วนนี้เพื่อทำ Relationship กับตาราง Category
          gorm:"foreignKey:CategoryID" บอกให้ใช้ฟิลด์ CategoryID เป็นตัวเชื่อม
      category_id:
        example: 2
        type: integer
      cost_price:
        example: 10.5
        type: number
      img_product:
        example: https://image.url/cola.jpg
        type: string
      name:
        example: น้ำอัดลม โคล่า
        type: string
      product_code:
        type: string
      product_id:
        type: integer
      sell_price:
        example: 15
        type: number
      shop_id:
        example: 1
        type: integer
      status:
        example: true
        type: boolean
      stock:
        description: gte=0 คือ มากกว่าหรือเท่ากับ 0
        example: 100
        minimum: 0
        type: integer
      unit:
        example: ขวด
        type: string
    required:
    - category_id
    - cost_price
    - img_product
    - name
    - sell_price
    - shop_id
    - unit
    type: object
  models.RegisterInput:
    properties:
      email:
        type: string
      password:
        example: "123456"
        type: string
      phone:
        type: string
      username:
        example: poder
        type: string
    required:
    - email
    - password
    - phone
    - username
    type: object
  models.Shop:
    properties:
      address:
        example: 123 ถ.สุขุมวิท แขวงคลองเตย เขตคลองเตย กทม 10110
        type: string
      img_qrcode:
        example: https://image.url/qrcode.jpg
        type: string
      img_shop:
        example: https://image.url/homeshop.jpg
        type: string
      name:
        example: จันทร์เพ็ญ
        type: string
      phone:
        example: "0985490445"
        type: string
      pin_code:
        example: "191047"
        type: string
      shop_id:
        type: integer
      user_id:
        example: 1
        type: integer
    required:
    - address
    - name
    - phone
    - pin_code
    - user_id
    type: object
  models.UpdateShopInput:
    properties:
      address:
        example: 555 ถ.ลาดพร้าว
        type: string
      img_qrcode:
        example: https://image.url/new_qrcode.jpg
        type: string
      img_shop:
        example: https://image.url/new_shop.jpg
        type: string
      name:
        example: ร้านจันทร์เพ็ญ (แก้ไข)
        type: string
      phone:
        example: "0899998888"
        type: string
      pin_code:
        example: "654321"
        type: string
    type: object
  models.UpdateStockRequest:
    properties:
      product_id:
        type: integer
      stock:
        type: integer
    required:
    - product_id
    - stock
    type: object
host: localhost:8080
info:
  contact: {}
  description: API สำหรับระบบ EazyStore
  title: EazyStore API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: ล็อกอินด้วย Username, Email หรือ เบอร์โทรศัพท์
      parameters:
      - description: ข้อมูลสำหรับ Login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: เข้าสู่ระบบ (Login)
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: ลงทะเบียนผู้ใช้ใหม่เข้าสู่ระบบ
      parameters:
      - description: ข้อมูลสำหรับสมัครสมาชิก
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.RegisterInput'
      produces:
      - application/json
      responses:
        "200":
          description: 'status: success'
          schema:
            type: object
      summary: สมัครสมาชิก
      tags:
      - Auth
  /api/createProduct:
    post:
      consumes:
      - application/json
      description: สร้างรายการสินค้าใหม่ลงในฐานข้อมูล
      parameters:
      - description: ข้อมูลสินค้า
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/models.Product'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: เพิ่มสินค้า
      tags:
      - Product
  /api/createShop:
    post:
      consumes:
      - application/json
      description: สร้างร้านค้าใหม่ลงในฐานข้อมูล
      parameters:
      - description: ข้อมูลร้านค้า
        in: body
        name: Shop
        required: true
        schema:
          $ref: '#/definitions/models.Shop'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Shop'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: เพิ่มร้านค้า
      tags:
      - Shop
  /api/deleteShop/{shop_id}:
    delete:
      consumes:
      - application/json
      description: ลบร้านค้าของ User id และ Shop id ที่ส่งเข้ามา
      parameters:
      - description: Shop ID
        in: path
        name: shop_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Shop not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ลบร้านค้า
      tags:
      - Shop
  /api/getShop:
    get:
      consumes:
      - application/json
      description: ดูร้านค้าของ User ที่ Login อยู่ (ดึง ID จาก Token)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Shop'
            type: array
        "404":
          description: Shop not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ดูร้านค้า
      tags:
      - Shop
  /api/product/search:
    get:
      consumes:
      - application/json
      description: ค้นหาสินค้าด้วย ID, Barcode, รหัสสินค้า หรือ ชื่อ
      parameters:
      - description: รหัสสินค้า (Product ID)
        in: query
        name: product_id
        type: integer
      - description: รหัสสินค้า (Product Code)
        in: query
        name: product_code
        type: string
      - description: บาร์โค้ด (Barcode)
        in: query
        name: barcode
        type: string
      - description: ชื่อสินค้า (Name)
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
        "400":
          description: Error message
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Product not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ค้นหาสินค้า (Search Product)
      tags:
      - Product
  /api/product/stock:
    put:
      consumes:
      - application/json
      description: บันทึกยอดสต็อกสินค้าล่าสุด
      parameters:
      - description: ข้อมูลอัปเดตสต็อก
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateStockRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'message: success'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid input
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Update failed
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: อัปเดตสต็อกสินค้า (Update Product Stock)
      tags:
      - Product
  /api/products:
    get:
      consumes:
      - application/json
      description: ดึงข้อมูลสินค้าทั้งหมดที่ผูกกับ shop_id โดยเรียงจากใหม่ไปเก่า
      parameters:
      - description: รหัสร้านค้า (Shop ID)
        in: query
        name: shop_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Product'
            type: array
        "400":
          description: กรุณาระบุ shop_id
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: ไม่สามารถดึงข้อมูลสินค้าได้
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: ดึงรายการสินค้าทั้งหมดของร้านค้า
      tags:
      - Product
  /api/products/{id}:
    put:
      consumes:
      - application/json
      description: อัปเดตข้อมูล และบันทึกประวัติราคา (Manual Log) ทุกครั้งที่มีการส่งค่าราคามา
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: ข้อมูลสินค้า
        in: body
        name: product
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
      security:
      - BearerAuth: []
      summary: แก้ไขข้อมูลสินค้า (Partial Update)
      tags:
      - Product
  /api/updateShop/{shop_id}:
    put:
      consumes:
      - application/json
      description: แก้ไขเฉพาะข้อมูลที่ส่งมา (Field ไหนไม่ส่งมา จะใช้ค่าเดิม)
      parameters:
      - description: Shop ID
        in: path
        name: shop_id
        required: true
        type: integer
      - description: ข้อมูลที่ต้องการแก้
        in: body
        name: shop
        required: true
        schema:
          $ref: '#/definitions/models.UpdateShopInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: แก้ไขข้อมูลร้านค้า
      tags:
      - Shop
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
